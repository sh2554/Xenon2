<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic -->
    <title>XenonCode</title>
    <meta
      name="description"
      content="XenonCode - Python Made Easy For Everyone."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Discord Embed -->
    <meta property="og:title" content="XenonCode" />
    <meta
      property="og:description"
      content="Python Made Easy For Everyone."
    />
    <meta property="og:url" content="https://xenoncode.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="XenonCode" />
    <meta
      property="og:image"
      content="https://xenoncode.xyz/embed.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XenonCode" />
    <meta
      name="twitter:description"
      content="Python Made Easy For Everyone."
    />
    <meta
      name="twitter:image"
      content="https://xenoncode.xyz/embed.png"
    />

    <!-- Browser Theme -->
    <meta name="theme-color" content="#5865F2" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
